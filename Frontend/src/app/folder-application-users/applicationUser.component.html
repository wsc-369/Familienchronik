<div class="container mt-5">
	<!-- Titelzeile -->
	<div class="row mb-3">
		<div class="col1">
			<h3>Benutzer</h3>
			<p class="text-muted">Notifikationen</p>
		</div>
	</div>

	<form>
		<div class="mb-3 row">
			<label for="table-complete-search" class="col-xs-3 col-sm-auto col-form-label">Full text search:</label>
			<div class="col-xs-3 col-sm-auto">
				<input id="table-complete-search" type="text" class="form-control" name="searchTerm"
					[(ngModel)]="service.searchTerm" />
			</div>
			@if (service.loading$ | async) {
			<span class="col col-form-label">Loading...</span>
			}
		</div>

		<table class="table table-striped">
			<thead>
				<tr>
					<th scope="col">#</th>
					<th scope="col" sortable="firstName" (sort)="onSort($event)">Vorname</th>
					<th scope="col" sortable="preName" (sort)="onSort($event)">Nachname</th>
					<th scope="col" sortable="admissionDate" (sort)="onSort($event)">Eintritt am</th>
					<th scope="col" sortable="paidDate" (sort)="onSort($event)">Beitrag am</th>
				</tr>
			</thead>
			<tbody>
				@for (user of users$ | async; track user.userId) {
				<tr>
					<th scope="row">{{ user.userId }}</th>
					<td>
						<img [src]="'https://upload.wikimedia.org/wikipedia/commons/' + user.flag"
							[alt]="'The flag of ' + user.zip" class="me-2" style="width: 20px" />
						<ngb-highlight [result]="user.firstName" [term]="service.searchTerm" />
					</td>
					<td><ngb-highlight [result]="user.preName" [term]="service.searchTerm" /></td>
					<td><ngb-highlight [result]="user.admissionDate | date" [term]="service.searchTerm" /></td>
					<td><ngb-highlight [result]="user.paidDate | date" [term]="service.searchTerm" /></td>
					<td><button class="btn btn-primary" type="button" (click)="onEdit(user)">Edit</button></td>
				</tr>
				} @empty {
				<tr>
					<td colspan="4" style="text-align: center">No users found</td>
				</tr>
				}
			</tbody>
		</table>

		<div class="d-flex justify-content-between p-2">
			<ngb-pagination [collectionSize]="(total$ | async)!" [(page)]="service.page" [pageSize]="service.pageSize">
			</ngb-pagination>

			<select class="form-select" style="width: auto" name="pageSize" [(ngModel)]="service.pageSize">
				<option [ngValue]="2">2 items per page</option>
				<option [ngValue]="4">4 items per page</option>
				<option [ngValue]="6">6 items per page</option>
			</select>
		</div>
	</form>

</div>

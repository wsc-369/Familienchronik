
<div class="container mt-5">
  <!-- Titelzeile -->
  <div class="row mb-3">
    <div class="col1">
      <h3>Vereinsmitglieder</h3>
      <p class="text-muted">Kontaktinformationen</p>
    </div>
  </div>


<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Country</th>
      <th scope="col">Area</th>
      <th scope="col">Population</th>
      <th scope="col">Aktion</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let country of countries">
      <th scope="row">{{ country.id }}</th>
      <td>
        <img
          [src]="'https://upload.wikimedia.org/wikipedia/commons/' + country.flag"
          class="me-2"
          style="width: 20px"
        />
        {{ country.name }}
      </td>
      <td>{{ country.area | number}}</td>
      <td>{{ country.population | number }}</td>
      <td><button class="btn btn-primary" type="button" (click)="onEdit(country)">Edit</button></td>
    </tr>
  </tbody>
</table>

<div class="d-flex justify-content-between p-2">
  <ngb-pagination
    [collectionSize]="collectionSize"
    [(page)]="page"
    [pageSize]="pageSize"
    (pageChange)="refreshCountries()">
  </ngb-pagination>

  <select
    class="form-select"
    style="width: auto"
    [(ngModel)]="pageSize"
    (ngModelChange)="refreshCountries()"
  >
    <option [ngValue]="2">2 items per page</option>
    <option [ngValue]="4">4 items per page</option>
    <option [ngValue]="6">6 items per page</option>
  </select>
</div>

</div>

<div class="container mt-5">
    <div class="row mb-3">
        <div class="col1">
            <h3>Projekte</h3>
            <p class="text-muted">alle Projekte in der Uebersicht</p>
        </div>
    </div>

    <div class="container py-4">
        <div class="row g-4">
            @for (project of projects; track project.id) {
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card project-card h-100">
                    <div class="card-header">
                        <div class="d-flex justify-content-start">
                            <div ngbDropdown>
                                <button ngbDropdownToggle class="btn btn-link p-0" aria-label="Projekt-Aktionen">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <div ngbDropdownMenu>
                                    <button ngbDropdownItem [routerLink]="project.route">Details</button>
                                    <button ngbDropdownItem>Aktion 2</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-body text-center d-flex flex-column justify-content-center" role="button"
                        [routerLink]="project.route" routerLinkActive="active">
                        <img [src]="project.icon" class="project-card-icon mb-3" [alt]="project.title" />

                        <h5 class="card-title">{{ project.title }}</h5>
                        <p class="card-text text-muted">{{ project.subtitle }}</p>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</div>

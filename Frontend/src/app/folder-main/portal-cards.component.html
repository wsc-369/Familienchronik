<div class="container mt-5">
    <!-- Titelzeile -->
    <div class="row mb-3">
        <div class="col1">
            <h3>Portal</h3>
            <p class="text-muted">alle Kategorien in der Übersicht</p>
        </div>
    </div>
    <div class="container py-4">
        <div class="row g-4">

            <div class="col-12 col-sm-6 col-lg-4 col-xl-3" *ngFor="let tile of tiles">

                <div class="card portal-card h-100 shadow-sm" 
                    role="button" 
                    [routerLink]="tile.route"
                    routerLinkActive="active">

                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <i [class]="'bi ' + tile.icon + ' display-4 mb-3'"></i>

                        <h5 class="card-title">{{ tile.title }}</h5>
                        <p class="card-text text-muted">{{ tile.subtitle }}</p>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

 
<!-- Header mit responsive Navbar -->
<header class="bg-dark navbar navbar-expand-lg navbar-dark fixed-top" [class.navbar-scrolled]="scrolled">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold" routerLink="/">Ahnenforschung & Familiengeschichte</a>

    <!-- Hamburger (nur auf Mobil) -->
    <button class="navbar-toggler d-lg-none" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen"
      aria-controls="navbarNav" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menü: Mobile Overlay, Desktop Horizontal -->
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" (click)="closeMenu()"
            [attr.aria-current]="currentUrl === '/' ? 'page' : null">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/portal-cards" routerLinkActive="active" (click)="closeMenu()">Portal</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/project-cards" routerLinkActive="active" (click)="closeMenu()">Projekte</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
        </li>
        <li class="nav-item" *ngIf="isAuthenticated$ | async">
          <a class="nav-link" routerLink="/dialect-words" routerLinkActive="active" (click)="closeMenu()">Dialektwörter</a>
        </li>
        <li class="nav-item" *ngIf="isAuthenticated$ | async">
          <a class="nav-link" routerLink="/content-templates" routerLinkActive="active" (click)="closeMenu()">ContentTemplates</a>
        </li>
        <li class="nav-item" *ngIf="!(isAuthenticated$ | async)">
          <a class="nav-link" routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
        </li>
        <li class="nav-item user-icon-item" *ngIf="isAuthenticated$ | async">
          <span class="nav-link user-icon" aria-label="Eingeloggt">
            <i class="bi bi-person-circle" aria-hidden="true"></i>
          </span>
        </li>
        <li class="nav-item" *ngIf="isAuthenticated$ | async">
          <a class="nav-link" href="#" (click)="logout(); $event.preventDefault()">Logout</a>
        </li>
        <!--  <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Kontakt</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/fileUpload" routerLinkActive="active" (click)="closeMenu()">Upload</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/familyTree" routerLinkActive="active" (click)="closeMenu()">Familienbaum</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/appUsers" routerLinkActive="active" (click)="closeMenu()">Mitglieder</a>
        </li> -->
        <!--  <li class="nav-item">
          <a class="nav-link" routerLink="/appUsers/focus" routerLinkActive="active" (click)="closeMenu()">Benutzer
            Edit</a>
        </li> -->

      </ul>
    </div>
  </div>
</header>

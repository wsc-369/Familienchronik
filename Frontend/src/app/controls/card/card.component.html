  <!-- Cards -->
  <div class="row mt-5 g-4">
    <div class="col-12 col-md-6 col-lg-4"
         *ngFor="let card of cards">
      <div class="card h-100 shadow-sm border-0">
        <!-- Bild -->
        <div *ngIf="card.imageUrl" class="position-relative overflow-hidden">
          <img [src]="card.imageUrl"
               class="card-img-top w-100"
               style="object-fit: cover; height: 180px;"
               alt="{{ card.title }}"
               loading="lazy">
        </div>

        <div class="card-body">
          <h5 class="card-title h5 fw-bold mb-2">{{ card.title }}</h5>
          <p class="card-text text-muted small">{{ card.summary }}</p>

          <!-- Tags nur auf Desktop -->
          <div class="mt-3 d-none d-md-flex flex-wrap gap-2">
            <span *ngFor="let tag of card.tags || []"
                  class="badge bg-secondary bg-opacity-10 text-secondary"
                  style="font-size: 0.75rem; padding: 0.25rem 0.5rem;">
              {{ tag }}
            </span>
          </div>
        </div>

        <!-- Link -->
        <div *ngIf="card.link"
             class="card-footer bg-transparent border-top py-2">
          <a [routerLink]="card.link" class="stretched-link">Mehr erfahren</a>
        </div>
      </div>
    </div>
  </div>

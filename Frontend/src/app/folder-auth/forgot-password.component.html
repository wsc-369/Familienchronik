<div class="auth-wrapper">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4">
      <h3 class="mb-3">Passwort vergessen</h3>
      <p class="text-muted">Gib deine E-Mail-Adresse ein, um einen Reset anzustossen.</p>

      <div *ngIf="successMessage" class="alert alert-success" role="alert">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">E-Mail</label>
          <input id="email" type="email" class="form-control" formControlName="email" />
          <small class="text-danger" *ngIf="form.controls.email.touched && form.controls.email.invalid">
            Bitte gueltige E-Mail eingeben.
          </small>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Wird gesendet...' : 'Reset-Link anfordern' }}
        </button>
      </form>

      <div class="mt-3 text-end">
        <a routerLink="/login">Zurueck zum Login</a>
      </div>
    </div>
  </div>
</div>

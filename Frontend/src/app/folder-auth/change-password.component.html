<div class="auth-wrapper">
  <div class="card auth-card shadow-sm">
    <div class="card-body p-4">
      <h3 class="mb-3">Passwort aendern</h3>

      <div *ngIf="successMessage" class="alert alert-success" role="alert">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="currentPassword">Aktuelles Passwort</label>
          <input id="currentPassword" type="password" class="form-control" formControlName="currentPassword" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="newPassword">Neues Passwort</label>
          <input id="newPassword" type="password" class="form-control" formControlName="newPassword" />
        </div>

        <div class="mb-3">
          <label class="form-label" for="confirmPassword">Neues Passwort bestaetigen</label>
          <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword" />
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Wird gespeichert...' : 'Passwort aktualisieren' }}
        </button>
      </form>

      <div class="mt-3 text-end">
        <a routerLink="/login">Zurueck zum Login</a>
      </div>
    </div>
  </div>
</div>

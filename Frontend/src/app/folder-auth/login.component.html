<div class="auth-wrapper">
  <div class="card auth-card shadow">
    <div class="card-body p-4">
      <h3 class="mb-3">Login</h3>
      <p class="text-muted mb-4">Bitte mit Benutzername und Passwort anmelden.</p>

      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="userName">Benutzername</label>
          <input id="userName" type="text" class="form-control" formControlName="userName" />
          <small class="text-danger" *ngIf="form.controls.userName.touched && form.controls.userName.invalid">
            Benutzername ist erforderlich (min. 3 Zeichen).
          </small>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Passwort</label>
          <input id="password" type="password" class="form-control" formControlName="password" />
          <small class="text-danger" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            Passwort ist erforderlich (min. 6 Zeichen).
          </small>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Anmeldung laeuft...' : 'Anmelden' }}
        </button>
      </form>

      <div class="d-flex justify-content-between mt-3">
        <a routerLink="/forgot-password">Passwort vergessen?</a>
        <a routerLink="/change-password">Passwort aendern</a>
      </div>
    </div>
  </div>
</div>
